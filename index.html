<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PF2E Character Generator</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <main class="container">
    <button id="themeToggle" class="theme-toggle" type="button" aria-label="Switch theme">&#9728;</button>

    <div class="page-header">
      <div>
        <h1>PF2E Character Generator</h1>
      </div>
    </div>

    <details class="options-panel">
      <summary class="options-summary">Generation Options</summary>

      <div class="controls-row options-content">
        <div class="control-group">
          <label for="rarityFilter" class="label">Allowed Rarities</label>
          <select id="rarityFilter" class="control-input">
            <option value="common-only">Common Only</option>
            <option value="common-uncommon">Common and Uncommon Only</option>
            <option value="all" selected>All Rarities</option>
          </select>
        </div>

        <div id="rarityModeGroup" class="control-group">
          <label for="rarityMode" class="label">Rarity Weighting</label>
          <select id="rarityMode" class="control-input">
            <option value="strong" selected>Common Favored (Common 10, Uncommon 3, Rare 1)</option>
            <option value="light">Balanced (Common 4, Uncommon 3, Rare 2)</option>
            <option value="off">Pure Random (All rarities 1)</option>
          </select>
        </div>

        <div class="control-group">
          <label for="accessFilter" class="label">Society Access</label>
          <select id="accessFilter" class="control-input">
            <option value="standard-only" selected>Hide Society Limited and Society Restricted</option>
            <option value="hide-restricted">Hide Society Restricted Only</option>
            <option value="all">Include All Entries</option>
          </select>
        </div>

        <div class="control-group">
          <label for="regionToggle" class="label">Region</label>
          <select id="regionToggle" class="control-input">
            <option value="on" selected>Roll Region</option>
            <option value="off">Turn Region Off</option>
          </select>
        </div>

        <div class="control-group">
          <label for="archetypeToggle" class="label">Archetype</label>
          <select id="archetypeToggle" class="control-input">
            <option value="on" selected>Roll Archetype</option>
            <option value="off">Turn Archetypes Off</option>
          </select>
        </div>

        <div class="control-group">
          <label for="deityToggle" class="label">Deity</label>
          <select id="deityToggle" class="control-input">
            <option value="on" selected>Roll Deity</option>
            <option value="off">Turn Deities Off</option>
          </select>
        </div>

        <div class="control-group">
          <label for="classChoice" class="label">Class</label>
          <select id="classChoice" class="control-input">
            <option value="" selected>Random Class</option>
          </select>
        </div>

        <div id="regionModeGroup" class="control-group">
          <label for="regionMode" class="label">Region Weighting</label>
          <select id="regionMode" class="control-input">
            <option value="inner-sea" selected>Default (Inner Sea)</option>
            <option value="explore">Explore (Non-Inner Sea Favored)</option>
            <option value="balanced">Balanced</option>
            <option value="custom">Custom</option>
          </select>
          <p id="regionModeHint" class="control-hint"></p>
        </div>
      </div>

      <div id="customRegionGroup" class="control-group control-group-wide" hidden>
        <span class="label">Custom Continents</span>
        <div id="regionCheckboxGroups" class="region-groups"></div>
      </div>

    <details class="weighting-panel">
      <summary class="weighting-summary">Weighting Guide</summary>

      <div class="weighting-content">
          <details class="weighting-group">
            <summary class="weighting-group-summary">Rarity</summary>
            <div id="rarityWeightingGuide" class="weighting-list weighting-group-content"></div>
          </details>

          <details class="weighting-group">
            <summary class="weighting-group-summary">Region</summary>
            <div id="regionWeightingGuide" class="weighting-list weighting-group-content"></div>
          </details>

          <details class="weighting-group">
            <summary class="weighting-group-summary">Deity</summary>
            <div id="deityWeightingGuide" class="weighting-list weighting-group-content"></div>
          </details>

          <details class="weighting-group">
            <summary class="weighting-group-summary">Archetype</summary>
            <div id="archetypeWeightingGuide" class="weighting-list weighting-group-content"></div>
          </details>

          <details class="weighting-group">
            <summary class="weighting-group-summary">Weapon</summary>
            <div id="weaponWeightingGuide" class="weighting-list weighting-group-content"></div>
          </details>
        </div>
      </details>

      <details class="source-panel">
        <summary class="source-summary">Source Selection</summary>

        <div class="control-group source-preset-group">
          <label for="sourcePreset" class="label">Source Preset</label>
          <select id="sourcePreset" class="control-input">
            <option value="core-only">Core Only</option>
            <option value="core-rulebooks">Core and Rulebooks</option>
            <option value="core-rulebooks-lost-omens" selected>Core, Rulebooks and Lost Omens</option>
            <option value="all">All Sources</option>
          </select>
        </div>

        <div class="control-group">
          <span class="label">Included Sources</span>
          <div id="sourceCheckboxGroups" class="source-groups"></div>
        </div>
      </details>

      <div class="settings-actions">
        <label class="remember-settings">
          <input id="rememberSettings" type="checkbox" checked />
          <span>Remember settings</span>
        </label>
        <button id="resetDefaultsBtn" class="secondary-button" type="button">Reset to Defaults</button>
      </div>
    </details>

    <p id="statusMessage" class="status-message" aria-live="polite">Loading character data...</p>

    <div class="button-row">
      <button id="generateBtn" disabled>Generate Character</button>
      <button id="retryBtn" class="secondary-button" type="button" hidden>Try Again</button>
    </div>

    <section class="result-card">
      <div class="result-grid">
        <div class="result-column">
          <div class="result-row result-row-accent result-row-accent-ancestry">
            <div class="result-header">
              <span class="label">Ancestry</span>
              <button id="lockAncestryBtn" class="lock-button" type="button">Lock</button>
            </div>
            <div class="value-row">
              <span id="ancestryResult" class="value">-</span>
              <span id="ancestrySource" class="source-slot"></span>
            </div>
          </div>

          <div class="result-row result-row-accent result-row-accent-ancestry">
            <div class="result-header">
              <span class="label">Heritage</span>
              <button id="lockHeritageBtn" class="lock-button" type="button">Lock</button>
            </div>
            <div class="value-row">
              <span id="heritageResult" class="value">-</span>
              <span id="heritageSource" class="source-slot"></span>
            </div>
          </div>

          <div class="result-row result-row-last result-row-accent result-row-accent-background">
            <div class="result-header">
              <span class="label">Background</span>
              <button id="lockBackgroundBtn" class="lock-button" type="button">Lock</button>
            </div>
            <div class="value-row">
              <span id="backgroundResult" class="value">-</span>
              <span id="backgroundSource" class="source-slot"></span>
            </div>
          </div>

        </div>

        <div class="result-column">
          <div class="result-row result-row-accent result-row-accent-class">
            <div class="result-header">
              <span class="label">Class</span>
              <button id="lockClassBtn" class="lock-button" type="button">Lock</button>
            </div>
            <div class="value-row">
              <span id="classResult" class="value">-</span>
              <span id="classSource" class="source-slot"></span>
            </div>
          </div>

          <div class="result-row result-row-accent result-row-accent-class">
            <div class="result-header">
              <span class="label">Key Ability</span>
              <button id="lockKeyAbilityBtn" class="lock-button" type="button">Lock</button>
            </div>
            <div class="value-row">
              <span id="keyAbilityResult" class="value">-</span>
            </div>
          </div>

          <div class="result-block result-row-last result-row-accent result-row-accent-class">
            <div class="result-header">
              <span class="label">Subclasses</span>
              <button id="lockSubclassesBtn" class="lock-button" type="button">Lock</button>
            </div>
            <div id="subclassResult" class="subclass-list">-</div>
          </div>
        </div>
      </div>

      <div id="secondaryResultsSection" class="secondary-results-section">
        <div class="result-divider" aria-hidden="true"></div>

        <div class="result-grid result-grid-secondary">
          <div id="optionalLeftColumn" class="result-column">
            <div id="regionSection" class="result-row result-row-secondary result-row-secondary-region">
              <div class="result-header">
                <span class="label">Region</span>
                <button id="lockRegionBtn" class="lock-button" type="button">Lock</button>
              </div>
              <div class="value-row">
                <span id="regionResult" class="value">-</span>
                <span id="regionSource" class="source-slot"></span>
              </div>
            </div>

            <div id="deitySection" class="deity-section">
              <div class="result-row result-row-secondary result-row-secondary-deity">
                <div class="result-header">
                  <span class="label">Deity</span>
                  <button id="lockDeityBtn" class="lock-button" type="button">Lock</button>
                </div>
                <div class="value-row deity-value-row">
                  <span id="deityResult" class="value">-</span>
                  <span id="deitySource" class="source-slot"></span>
                </div>
              </div>
            </div>
          </div>

          <div id="optionalRightColumn" class="result-column">
            <div id="archetypeSection" class="archetype-section">
              <div id="archetypeRow" class="result-row result-row-secondary result-row-secondary-archetype">
                <div class="result-header">
                  <span class="label">Archetype</span>
                  <button id="lockArchetypeBtn" class="lock-button" type="button">Lock</button>
                </div>
                <div class="value-row">
                  <span id="archetypeResult" class="value">-</span>
                  <span id="archetypeSource" class="source-slot"></span>
                </div>
              </div>
            </div>

            <div id="weaponSection" class="weapon-section">
              <div class="result-row result-row-secondary result-row-secondary-weapon">
                <div class="result-header">
                  <span class="label">Favored Weapon</span>
                  <button id="lockWeaponBtn" class="lock-button" type="button">Lock</button>
                </div>
                <div class="value-row">
                  <span id="weaponResult" class="value">-</span>
                  <span id="weaponSource" class="source-slot"></span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="assets/vendor/xlsx.full.min.js"></script>
  <script src="assets/js/script.js"></script>
</body>
</html>
